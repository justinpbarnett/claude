# AI Coding Harness Configuration
# Defines where each harness expects its config and how to map our unified repo.
#
# Source of truth: this repo (~/dev/ai)
# Install: ./install.sh [harness|all]   (or python install.py)
# Uninstall: ./uninstall.sh [harness|all]
#
# Minimal profile: only skills + tiny per-harness config files are installed.
# No rules, hooks, agents, plugins, MCP servers, or top-level guidelines files.
#
# skills_mode:
#   "directory" (default) → symlink the whole skills/ folder into the target
#   "children"            → create individual symlinks for each skill (codex, droid, etc.)
# skills_name: override the directory name skills appear under (e.g. "skills-cursor" for Cursor)

# ─────────────────────────────────────────────────────────────────────────────
# Claude Code
# Docs: https://docs.anthropic.com/en/docs/claude-code
# ─────────────────────────────────────────────────────────────────────────────
[claude]
target = "~/.claude"
config_format = "json"

[claude.symlinks]
skills = "skills"
"settings.json" = "harness/claude/settings.json"

# ─────────────────────────────────────────────────────────────────────────────
# ForgeCode
# Docs: https://forgecode.dev/docs/
# ─────────────────────────────────────────────────────────────────────────────
[forge]
target = "~/forge"
config_format = "toml"

[forge.symlinks]
skills = "skills"
".forge.toml" = "harness/forge/.forge.toml"

# ─────────────────────────────────────────────────────────────────────────────
# OpenCode
# Docs: https://opencode.ai/docs/config
# ─────────────────────────────────────────────────────────────────────────────
[opencode]
target = "~/.config/opencode"
config_format = "jsonc"

[opencode.symlinks]
skills = "skills"
"opencode.json" = "harness/opencode/opencode.json"

# ─────────────────────────────────────────────────────────────────────────────
# Codex CLI (OpenAI)
# Docs: https://developers.openai.com/codex
# ─────────────────────────────────────────────────────────────────────────────
[codex]
target = "~/.codex"
skills_mode = "children"
config_format = "toml"

[codex.symlinks]
skills = "skills"
"config.toml" = "harness/codex/config.toml"

# ─────────────────────────────────────────────────────────────────────────────
# Factory.ai Droid
# Docs: https://docs.factory.ai/cli/configuration/skills
# ─────────────────────────────────────────────────────────────────────────────
[droid]
target = "~/.factory"
skills_mode = "children"
config_format = "json"

[droid.symlinks]
skills = "skills"

# ─────────────────────────────────────────────────────────────────────────────
# Pi
# Docs: https://github.com/mariozechner/pi
# ─────────────────────────────────────────────────────────────────────────────
[pi]
target = "~/.pi/agent"
config_format = "json"

[pi.symlinks]
skills = "skills"
"settings.json" = "pi-config/settings.json"
"models.json" = "pi-config/models.json"
"keybindings.json" = "pi-config/keybindings.json"
"autoresearch.config.json" = "pi-config/autoresearch.config.json"
extensions = "pi-config/extensions"

# ─────────────────────────────────────────────────────────────────────────────
# Cursor
# Cursor's agent/CLI mode uses a custom skills directory name.
# Docs: https://cursor.com (CLI + Composer rules)
# ─────────────────────────────────────────────────────────────────────────────
[cursor]
target = "~/.cursor"
skills_name = "skills-cursor"
config_format = "json"

[cursor.symlinks]
"skills-cursor" = "skills"
# "cli-config.json" = "harness/cursor/cli-config.json"   # add when you want to manage it

# ─────────────────────────────────────────────────────────────────────────────
# Grok (xAI Grok Build / Grok CLI)
# Skills live directly under ~/.grok/skills
# Docs: https://grok.x.ai
# ─────────────────────────────────────────────────────────────────────────────
[grok]
target = "~/.grok"
config_format = "toml"

[grok.symlinks]
skills = "skills"
# "config.toml" = "harness/grok/config.toml"             # add when you want a managed base config
